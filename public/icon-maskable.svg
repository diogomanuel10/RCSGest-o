<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Real Clube Senhorense">
  <!-- Fundo cheio (navy) para qualquer máscara (círculo, squircle…) não cortar o emblema -->
  <rect width="64" height="64" fill="#143B61" />
  <!-- Emblema reduzido para a "zona segura" central (~70%) -->
  <g transform="translate(32 32) scale(0.66) translate(-32 -32)">
    <g fill="none" stroke="#F2B705" stroke-width="2.6" stroke-linecap="round">
      <circle cx="32" cy="27" r="15" stroke="#F4F7FA" stroke-width="2.4" />
      <path d="M32 12 C 24 20, 22 32, 26 42" />
      <path d="M32 12 C 40 20, 42 32, 38 42" />
      <path d="M18 22 C 28 26, 38 26, 47 21" />
    </g>
    <text x="32" y="56" text-anchor="middle"
          font-family="'Barlow Semi Condensed', sans-serif" font-weight="700"
          font-size="13" letter-spacing="1.5" fill="#F2B705">RCS</text>
  </g>
</svg>
